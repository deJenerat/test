<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Форма пользователя</title>
  <style>
    .form-group { margin-bottom: 15px; }
    label { display: inline-block; width: 100px; }
    input { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 8px 16px; margin-right: 10px; cursor: pointer; }
    .save-btn { background-color: #4CAF50; color: white; border: none; }
    .cancel-btn { background-color: #f44336; color: white; border: none; }
    hr { margin: 20px 0; }
    .address-section {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<h1 th:text="${user.id != null} ? '✏️ Редактирование пользователя' : '➕ Добавление пользователя'">Форма</h1>

<form action="#" th:action="@{/users/save}" th:object="${user}" method="post">
  <input type="hidden" th:field="*{id}"/>

  <div class="form-group">
    <label>Имя:</label>
    <input type="text" th:field="*{firstName}" required/>
  </div>
  <div class="form-group">
    <label>Фамилия:</label>
    <input type="text" th:field="*{lastName}" required/>
  </div>
  <div class="form-group">
    <label>Возраст:</label>
    <input type="number" th:field="*{age}" required/>
  </div>

  <div class="address-section">
    <h3>🏠 Адрес (необязательно)</h3>
    <p style="color: #666; font-size: 12px; margin-bottom: 15px;">
      Оставьте поля пустыми, если не хотите указывать адрес
    </p>

    <div class="form-group">
      <label>Город:</label>
      <input type="text" th:field="*{address.city}"/>
    </div>
    <div class="form-group">
      <label>Улица:</label>
      <input type="text" th:field="*{address.street}"/>
    </div>
    <div class="form-group">
      <label>Дом:</label>
      <input type="text" th:field="*{address.house}"/>
    </div>
  </div>

  <div class="form-group" style="margin-top: 20px;">
    <button type="submit" class="save-btn">💾 Сохранить</button>
    <button type="button" class="cancel-btn" onclick="location.href='/users'">❌ Отмена</button>
  </div>
</form>
</body>
</html>
