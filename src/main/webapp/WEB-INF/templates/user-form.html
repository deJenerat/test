<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Форма пользователя</title>
</head>
<body>

<h1 th:text="${user.id != null} ? 'Редактирование пользователя' : 'Добавление пользователя'">
  Форма пользователя
</h1>

<form action="#" th:action="@{/users/save}" th:object="${user}" method="post">

  <input type="hidden" th:field="*{id}"/>

  <p>
    <label>Имя:</label>
    <input type="text" th:field="*{firstName}" required/>
  </p>

  <p>
    <label>Фамилия:</label>
    <input type="text" th:field="*{lastName}" required/>
  </p>

  <p>
    <label>Возраст:</label>
    <input type="number" th:field="*{age}" required/>
  </p>

  <hr/>

  <h3>Адрес (необязательно)</h3>

  <p>
    <label>Город:</label>
    <input type="text" th:field="*{address.city}"/>
  </p>

  <p>
    <label>Улица:</label>
    <input type="text" th:field="*{address.street}"/>
  </p>

  <p>
    <label>Дом:</label>
    <input type="text" th:field="*{address.house}"/>
  </p>

  <p>
    <button type="submit">Сохранить</button>
    <a href="/users">Отмена</a>
  </p>

</form>

</body>
</html>
