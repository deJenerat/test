<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Результаты поиска</title>
</head>
<body>

<h1>Результаты поиска</h1>

<p>Найдено пользователей по: <strong th:text="${searchType}"></strong></p>

<table border="1">
  <thead>
  <tr>
    <th>ID</th>
    <th>Имя</th>
    <th>Фамилия</th>
    <th>Возраст</th>
    <th>Адрес</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${users}">
    <td th:text="${user.id}">1</td>
    <td>
      <a th:href="@{/users/{id}(id=${user.id})}" th:text="${user.firstName}">Имя</a>
    </td>
    <td th:text="${user.lastName}">Фамилия</td>
    <td th:text="${user.age}">возраст</td>
    <td>
            <span th:if="${user.address != null}">
                <span th:text="${user.address.city}">Город</span>,
                <span th:text="${user.address.street}">Улица</span>,
                <span th:text="${user.address.house}">Дом</span>
            </span>
      <span th:unless="${user.address != null}">Адрес не указан</span>
    </td>
    <td>
      <a th:href="@{/users/{id}/edit(id=${user.id})}">Изменить</a>
      |
      <a th:href="@{/users/{id}/delete(id=${user.id})}"
         onclick="return confirm('Удалить пользователя?')">Удалить</a>
    </td>
  </tr>
  <tr th:if="${users.isEmpty()}">
    <td colspan="6" align="center">Пользователи не найдены</td>
  </tr>
  </tbody>
</table>

<br/>
<a href="/users">← Назад ко всем пользователям</a>

</body>
</html>
